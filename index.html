<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>島內散步｜產品與報價工具</title>
<style>
  :root{
    --bg:#f5f7fa; --panel:#fff; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb;
    --brand:#b45309; --brand2:#92400e; --accent:#0f766e;
    --ok:#059669; --warn:#d97706; --danger:#dc2626; --soft:#f3f4f6;
    --shadow:0 1px 3px rgba(17,24,39,.07),0 8px 24px rgba(17,24,39,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6}
  button{font-family:inherit;cursor:pointer}
  .app{display:flex;min-height:100vh}
  .side{width:220px;background:linear-gradient(180deg,#b45309,#7c2d12);color:#fff7ed;
    display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
  .side .logo{padding:22px 20px 14px;font-weight:800;font-size:17px}
  .side .logo small{display:block;font-weight:400;font-size:11px;opacity:.75;margin-top:3px}
  .nav{flex:1;padding:6px}
  .nav a{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:9px;
    color:#ffedd5;text-decoration:none;font-weight:600;margin:2px 0;font-size:13.5px}
  .nav a:hover{background:rgba(255,255,255,.1)}
  .nav a.active{background:rgba(255,255,255,.18);color:#fff}
  .nav .badge{margin-left:auto;background:#fff;color:var(--brand);border-radius:999px;
    font-size:11px;font-weight:800;padding:1px 8px}
  .side .foot{padding:14px 18px;font-size:11px;opacity:.65;border-top:1px solid rgba(255,255,255,.15)}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 26px;position:sticky;top:0;z-index:5}
  .topbar h1{font-size:18px;margin:0}
  .topbar .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .content{padding:22px 26px;max-width:1240px;width:100%}

  .btn{border:none;background:var(--brand);color:#fff;padding:9px 15px;border-radius:9px;font-weight:600;font-size:13px}
  .btn:hover{background:var(--brand2)}
  .btn.ghost{background:var(--soft);color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{background:#e7eaee}
  .btn.sm{padding:5px 10px;font-size:12px;border-radius:7px}
  .btn.ok{background:var(--accent)} .btn.ok:hover{filter:brightness(.93)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow)}

  /* filters */
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
  .fg{display:flex;flex-direction:column;gap:4px}
  .fg label{font-size:11.5px;font-weight:700;color:var(--muted)}
  .inp,select{padding:8px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:#fff}
  .inp:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(180,83,9,.12)}
  .search-inp{min-width:240px}
  .count{font-size:12.5px;color:var(--muted);margin:0 0 12px}

  /* product grid */
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:13px}
  .pcard{padding:15px;border-radius:12px;display:flex;flex-direction:column;gap:8px}
  .pcard h3{margin:0;font-size:14.5px;line-height:1.4}
  .ptags{display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-size:11px;padding:2px 8px;border-radius:6px;background:var(--soft);color:var(--muted);font-weight:600}
  .tag.cat{background:#fef3c7;color:#92400e}
  .tag.area{background:#e0f2fe;color:#075985}
  .tag.esg{background:#dcfce7;color:#166534}
  .tag.topic{background:#f3e8ff;color:#7e22ce}
  .pcard .price{font-weight:800;color:var(--brand);font-size:14px}
  .pcard .meta{font-size:12px;color:var(--muted)}
  .pcard .note{font-size:11.5px;color:#9ca3af;background:var(--soft);border-radius:7px;padding:6px 8px;white-space:pre-wrap}
  .pcard .row{display:flex;gap:8px;align-items:center;margin-top:auto;padding-top:6px}
  .pcard a.link{font-size:12px;color:var(--accent);text-decoration:none;font-weight:600}
  .pcard a.link:hover{text-decoration:underline}

  /* quote */
  .qwrap{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
  @media(max-width:900px){.qwrap{grid-template-columns:1fr}}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{background:var(--soft);font-weight:700;color:#4b5563;font-size:12px}
  td.num,th.num{text-align:right}
  .qty-inp,.price-inp{width:84px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-size:13px;text-align:right}
  .lineDel{color:var(--danger);background:none;border:none;font-size:16px;line-height:1}
  .summary .row{display:flex;justify-content:space-between;padding:7px 0;font-size:13.5px;border-bottom:1px dashed var(--line)}
  .summary .row.big{font-size:17px;font-weight:800;border-bottom:none;padding-top:12px}
  .summary .row.big .v{color:var(--brand)}
  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .empty .big{font-size:44px;margin-bottom:10px}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;
    padding:11px 20px;border-radius:10px;font-size:13.5px;font-weight:600;z-index:99;box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;bottom:34px}
  .hint{background:#fffbeb;border:1px solid #fde68a;color:#854d0e;padding:11px 15px;border-radius:11px;font-size:12.5px;margin-bottom:16px}
  .hint.info{background:#ecfeff;border-color:#a5f3fc;color:#155e63}
  .modal-bg{position:fixed;inset:0;background:rgba(17,24,39,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal{background:#fff;border-radius:15px;width:100%;max-width:720px;max-height:90vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.3)}
  .modal h3{margin:0;padding:16px 20px;border-bottom:1px solid var(--line);font-size:16px}
  .modal .body{padding:18px 20px}
  .modal .foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px}
  pre.draft{background:var(--soft);border-radius:10px;padding:14px;font-size:13px;white-space:pre-wrap;font-family:inherit;line-height:1.7;max-height:52vh;overflow:auto}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700}
  .pill.prod{background:#fef3c7;color:#92400e}.pill.comp{background:#e0e7ff;color:#3730a3}
  /* 客戶需求表單 */
  .bfld{display:block;margin-bottom:16px}
  .bfld>span{display:block;font-size:12.5px;font-weight:700;color:#475569;margin-bottom:6px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 14px;border-radius:999px;font-size:13px}
  .chip:hover{border-color:var(--brand)}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  textarea.inp{width:100%;font-family:inherit;resize:vertical}
  .needbar{display:flex;gap:14px;align-items:center;flex-wrap:wrap;padding:12px 16px;margin-bottom:14px}
  .needbar .lbl{font-weight:800}
  .needbar .desc{color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="logo">島內散步<small>產品與報價工具 ｜ 2B 業務</small></div>
    <nav class="nav" id="nav">
      <a data-view="brief" class="active"><span>📝</span>① 客戶需求</a>
      <a data-view="search"><span>🔍</span>② 找產品・規劃</a>
      <a data-view="quote"><span>🧮</span>③ 報價試算<span class="badge" id="navCount" style="display:none">0</span></a>
      <a data-view="proposal"><span>📄</span>④ 提案產生</a>
      <a data-view="past"><span>🗂️</span>過去提案參考</a>
      <a data-view="template"><span>📐</span>行程成本範本</a>
    </nav>
    <div style="padding:10px 12px"><button class="btn" id="feedbackBtn" style="width:100%;background:rgba(255,255,255,.16)">💬 意見回饋</button></div>
    <div class="foot">產品資料：Zoho 快照<br><span id="snapInfo">—</span><br>試用版 v0.1</div>
  </aside>
  <main class="main">
    <div class="topbar">
      <h1 id="pageTitle">產品搜尋</h1>
      <div class="sub" id="pageSub">依客戶需求快速找到合適行程與元件</div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>
<div id="toast" class="toast"></div>
<div id="modalRoot"></div>
<script src="products.js"></script>
<script src="proposals.js"></script>
<script src="app.js"></script>
</body>
</html>
